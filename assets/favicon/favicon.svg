<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d07a"/>
      <stop offset="55%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#c9870a"/>
    </linearGradient>
    <radialGradient id="dropGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff3c8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c9870a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark backdrop disc for contrast on light browsers -->
  <circle cx="32" cy="32" r="30" fill="#150b00"/>

  <!-- Water-drop silhouette -->
  <path d="M32 8 C 20 24, 14 34, 14 42 C 14 52, 22 58, 32 58 C 42 58, 50 52, 50 42 C 50 34, 44 24, 32 8 Z"
        fill="url(#dropGrad)"/>

  <!-- Inner Flower-of-Life hint -->
  <g fill="none" stroke="#150b00" stroke-opacity="0.55" stroke-width="1.4">
    <circle cx="32" cy="38" r="6"/>
    <circle cx="32" cy="32" r="6"/>
    <circle cx="32" cy="44" r="6"/>
    <circle cx="26.8" cy="35" r="6"/>
    <circle cx="37.2" cy="35" r="6"/>
    <circle cx="26.8" cy="41" r="6"/>
    <circle cx="37.2" cy="41" r="6"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="32" cy="32" rx="14" ry="20" fill="url(#dropGlow)"/>
</svg>
